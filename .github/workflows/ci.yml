name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Components
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Detect changed modules and compute versions
        id: detect
        run: |
          # 非 main 分支的 push 直接跳过
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Not main branch, skipping"
            exit 0
          fi

          MODULES=(
            "startup"
            "logger"
            "router"
            "network"
            "base"
            "login"
            "reactnative"
            "websdk"
            "shortvideo"
            "user"
            "home"
          )

          # 获取 merge commit 的第二父节点（develop 分支的 commit）
          SECOND_PARENT=$(git rev-parse main^2 2>/dev/null || echo "")

          if [ -n "$SECOND_PARENT" ]; then
            CHANGED_FILES=$(git diff --name-only main^..main^2)
          else
            CHANGED_FILES=$(git diff --name-only main^..main)
          fi

          CHANGED_MODULES=""
          for module in "${MODULES[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              CHANGED_MODULES="${CHANGED_MODULES},${module}"
            fi
          done
          CHANGED_MODULES=${CHANGED_MODULES#,}

          if [ -z "$CHANGED_MODULES" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "No modules changed, skip publish"
            exit 0
          fi

          echo "changed-modules=${CHANGED_MODULES}" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT

          BUILD_VERSIONS=""

          for module in $(echo "$CHANGED_MODULES" | tr ',' ' '); do
            # 使用 GitHub Packages API 获取该模块的最新版本
            PACKAGE_NAME="com.mohanlv.${module}"
            API_URL="https://api.github.com/users/lvtong199881/packages/maven/${PACKAGE_NAME}/versions?per_page=1"

            # 将响应写入临时文件，避免 shell pipe 问题
            curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "$API_URL" > /tmp/api_response.json

            LATEST_VERSION=$(python3 -c "
import json
try:
    with open('/tmp/api_response.json') as f:
        data = json.load(f)
    if isinstance(data, list) and len(data) > 0:
        print(data[0].get('name', ''))
    else:
        print('')
except:
    print('')
" 2>/dev/null)

            if [ -z "$LATEST_VERSION" ]; then
              NEW_VERSION="1.0.0"
            else
              LAST_NUM=$(echo $LATEST_VERSION | awk -F'.' '{print $3}')
              NEW_LAST_NUM=$((LAST_NUM + 1))
              NEW_VERSION=$(echo $LATEST_VERSION | awk -F'.' -v n="$NEW_LAST_NUM" '{OFS="."; $3=n; print}')
            fi

            echo ">>> $module: ${LATEST_VERSION:-从未发布} -> ${NEW_VERSION}"
            BUILD_VERSIONS="${BUILD_VERSIONS},${module}:${NEW_VERSION}"
          done

          BUILD_VERSIONS=${BUILD_VERSIONS#,}
          echo "build-versions=${BUILD_VERSIONS}" >> $GITHUB_OUTPUT

      - name: Get commit log
        id: commits
        run: |
          LOG=$(git log --oneline origin/main^..origin/main | sed 's/^/  - /')
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and publish changed modules
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED="${{ steps.detect.outputs.changed-modules }}"
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"

          if [ -z "$CHANGED" ]; then
            echo "No modules changed, skip publish"
            echo "SKIP=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "SKIP=false" >> $GITHUB_OUTPUT
          echo "========================================"
          echo "Publishing modules: $CHANGED"
          echo "Build versions: $BUILD_VERSIONS"
          echo "========================================"

          # 发布顺序（按依赖拓扑排序）
          ORDER=(
            "startup"
            "logger"
            "router"
            "network"
            "base"
            "login"
            "reactnative"
            "websdk"
            "shortvideo"
            "user"
            "home"
          )

          IFS=',' read -ra CHANGED_ARRAY <<< "$CHANGED"
          IFS=',' read -ra VERSIONS_ARRAY <<< "$BUILD_VERSIONS"

          # 构建 module -> version 映射
          declare -A MODULE_VERSIONS
          for entry in "${VERSIONS_ARRAY[@]}"; do
            module="${entry%%:*}"
            version="${entry#*:}"
            MODULE_VERSIONS["$module"]="$version"
          done

          for module in "${ORDER[@]}"; do
            SHOULD_BUILD=0
            for changed in "${CHANGED_ARRAY[@]}"; do
              if [ "$changed" = "$module" ]; then
                SHOULD_BUILD=1
                break
              fi
            done

            if [ "$SHOULD_BUILD" = "0" ]; then
              continue
            fi

            VERSION="${MODULE_VERSIONS[$module]}"
            echo ""
            echo ">>> Building :${module}:assembleRelease (version: ${VERSION})"
            ./gradlew :${module}:assembleRelease \
              -P${module}.version=${VERSION} \
              --no-daemon \
              -q

            if [ $? -ne 0 ]; then
              echo "✗ $module build failed"
              exit 1
            fi

            echo ">>> Publishing $module v${VERSION}"
            ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository \
              -P${module}.version=${VERSION} \
              --no-daemon \
              -q

            if [ $? -eq 0 ]; then
              echo "✓ $module v${VERSION} published"
            else
              echo "✗ $module publish failed"
              exit 1
            fi
          done

      - name: Create GitHub Release
        if: steps.build.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.detect.outputs.build-versions }}
          name: Release ${{ steps.detect.outputs.build-versions }}
          body: |
            ## Changes

            ${{ steps.commits.outputs.log }}

            ## Modules Published

            ${{ steps.detect.outputs.build-versions }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ComponentHostApp
        if: steps.build.outputs.SKIP != 'true'
        run: |
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"

          echo "========================================"
          echo "Updating ComponentHostApp"
          echo "Build versions: $BUILD_VERSIONS"
          echo "========================================"

          cd ..
          git clone https://github.com/lvtong199881/ComponentHostApp.git
          cd ComponentHostApp
          git checkout main

          # BUILD_VERSIONS 格式: module:version,module:version,...
          IFS=',' read -ra VERSIONS_ARRAY <<< "$BUILD_VERSIONS"
          for entry in "${VERSIONS_ARRAY[@]}"; do
            module="${entry%%:*}"
            version="${entry#*:}"
            echo "Updating com.mohanlv:${module} to ${version}"
            sed -i.bak "s/com\.mohanlv:${module}:[0-9.]*/com.mohanlv:${module}:${version}/g" app/build.gradle.kts
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update components to new versions"
            git push
            echo "✓ ComponentHostApp updated"
          fi
