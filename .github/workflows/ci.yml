name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Components
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Write Python version parser
        run: |
          echo '' | base64 -d > /tmp/get_version.py

      - name: Detect changed modules and compute versions
        id: detect
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Not main branch, skipping"
            exit 0
          fi

          MODULES="startup logger router network base login reactnative websdk shortvideo user home"
          PREV_MAIN=$(git rev-parse main~1 2>/dev/null || git rev-parse main^1 2>/dev/null || echo "")

          if [ -n "$PREV_MAIN" ]; then
            CHANGED_FILES=$(git diff --name-only $PREV_MAIN..main)
          else
            CHANGED_FILES=""
          fi

          CHANGED_MODULES=""
          for module in $MODULES; do
            if echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              CHANGED_MODULES="${CHANGED_MODULES},${module}"
            fi
          done
          CHANGED_MODULES=${CHANGED_MODULES#,}

          if [ -z "$CHANGED_MODULES" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "No modules changed, skip publish"
            exit 0
          fi

          echo "changed-modules=${CHANGED_MODULES}" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT

          BUILD_VERSIONS=""

          for module in $(echo "$CHANGED_MODULES" | tr ',' ' '); do
            PACKAGE_NAME="com.mohanlv.${module}"
            API_URL="https://api.github.com/users/lvtong199881/packages/maven/${PACKAGE_NAME}/versions?per_page=100"
            curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "$API_URL" > /tmp/api_response.json
            LATEST_VERSION=$(python3 /tmp/get_version.py /tmp/api_response.json 2>/dev/null)
            if [ -z "$LATEST_VERSION" ]; then
              NEW_VERSION="1.0.0"
            else
              LAST_NUM=$(echo $LATEST_VERSION | awk -F'.' '{print $3}')
              NEW_LAST_NUM=$((LAST_NUM + 1))
              NEW_VERSION=$(echo $LATEST_VERSION | awk -F'.' -v n="$NEW_LAST_NUM" '{OFS="."; $3=n; print}')
            fi
            echo ">>> $module: ${LATEST_VERSION:-从未发布} -> ${NEW_VERSION}"
            BUILD_VERSIONS="${BUILD_VERSIONS},${module}:${NEW_VERSION}"
          done

          BUILD_VERSIONS=${BUILD_VERSIONS#,}
          echo "build-versions=${BUILD_VERSIONS}" >> $GITHUB_OUTPUT

      - name: Get commit log
        id: commits
        run: |
          PREV_MAIN=$(git rev-parse main~1 2>/dev/null || git rev-parse main^1 2>/dev/null || echo "")
          if [ -n "$PREV_MAIN" ]; then
            LOG=$(git log --oneline $PREV_MAIN..main | sed 's/^/  - /')
          else
            LOG=$(git log --oneline -10 main | sed 's/^/  - /')
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and publish changed modules
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED="${{ steps.detect.outputs.changed-modules }}"
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"

          if [ -z "$CHANGED" ]; then
            echo "No modules changed, skip publish"
            echo "SKIP=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "SKIP=false" >> $GITHUB_OUTPUT
          echo "========================================"
          echo "Publishing modules: $CHANGED"
          echo "Build versions: $BUILD_VERSIONS"
          echo "========================================"

          ORDER="startup logger router network base login reactnative websdk shortvideo user home"

          for module in $ORDER; do
            SHOULD_BUILD=0
            for changed in $(echo "$CHANGED" | tr ',' ' '); do
              if [ "$changed" = "$module" ]; then
                SHOULD_BUILD=1
                break
              fi
            done

            if [ "$SHOULD_BUILD" = "0" ]; then
              continue
            fi

            VERSION=$(echo "$BUILD_VERSIONS" | tr ',' '\n' | grep "^${module}:" | cut -d: -f2)
            echo ""
            echo ">>> Building :${module}:assembleRelease (version: ${VERSION})"
            ./gradlew :${module}:assembleRelease -P${module}.version=${VERSION} --no-daemon -q

            if [ $? -ne 0 ]; then
              echo "✗ $module build failed"
              exit 1
            fi

            echo ">>> Publishing $module v${VERSION}"
            PUBLISH_OUTPUT=""
            set +e
            ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${VERSION} --no-daemon --stacktrace 2>&1 | tee /tmp/publish_output.txt
            PUBLISH_EXIT=${PIPESTATUS[0]}
            set -e
            
            if [ ${PUBLISH_EXIT} -ne 0 ]; then
              if grep -q "409\|Conflict" /tmp/publish_output.txt 2>/dev/null; then
                echo "!! Publish 409 conflict detected, detecting actual latest version..."
                # 重新获取实际最新版本
                MODULE_API_URL="https://api.github.com/users/lvtong199881/packages/maven/com.mohanlv.${module}/versions?per_page=100"
                curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "$MODULE_API_URL" > /tmp/api_response.json
                ACTUAL_LATEST=$(python3 /tmp/get_version.py /tmp/api_response.json 2>/dev/null || echo "")
                if [ -n "$ACTUAL_LATEST" ]; then
                  LAST_NUM=$(echo $ACTUAL_LATEST | awk -F'.' '{print $3}')
                  RETRY_VERSION=$(echo $ACTUAL_LATEST | awk -F'.' -v n="$((LAST_NUM + 1))" '{OFS="."; $3=n; print}')
                  echo ">>> Retrying with version $RETRY_VERSION"
                  ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${RETRY_VERSION} --no-daemon -q
                  if [ $? -eq 0 ]; then
                    echo "✓ $module v${RETRY_VERSION} published (retry successful)"
                    BUILD_VERSIONS=$(echo "$BUILD_VERSIONS" | sed "s/${module}:${VERSION}/${module}:${RETRY_VERSION}/")
                  else
                    echo "✗ $module publish retry failed"
                    exit 1
                  fi
                else
                  echo "✗ Could not determine latest version for retry"
                  exit 1
                fi
              else
                echo "✗ $module publish failed (exit ${PUBLISH_EXIT})"
                exit 1
              fi
            else
              echo "✓ $module v${VERSION} published"
            fi
          done

      - name: Create GitHub Release
        if: steps.build.outputs.SKIP != 'true'
        id: create-release
        run: |
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"
          if echo "$BUILD_VERSIONS" | grep -q ','; then
            TAG_NAME=$(echo "$BUILD_VERSIONS" | tr ',' '\n' | while read entry; do
              MODULE=$(echo "$entry" | cut -d: -f1)
              VERSION=$(echo "$entry" | cut -d: -f2)
              echo "${MODULE}-${VERSION}"
            done | tr '\n' '_' | sed 's/_$//' | sed 's/_/-/g')
          else
            TAG_NAME=$(echo "$BUILD_VERSIONS" | cut -d: -f2)
          fi
          echo "TAG_NAME=v${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Created tag: v${TAG_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        if: steps.build.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create-release.outputs.TAG_NAME }}
          name: Release ${{ steps.detect.outputs.build-versions }}
          body: |
            ## Changes

            ${{ steps.commits.outputs.log }}

            ## Modules Published

            ${{ steps.detect.outputs.build-versions }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ComponentHostApp
        if: steps.build.outputs.SKIP != 'true'
        run: |
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"
          echo "========================================"
          echo "Updating ComponentHostApp"
          echo "Build versions: $BUILD_VERSIONS"
          echo "========================================"

          cd ..
          git clone "https://x-access-token:${secrets.COMPONENT_HOST_APP_TOKEN}@github.com/lvtong199881/ComponentHostApp.git"
          cd ComponentHostApp
          git checkout main

          IFS=',' read -ra VERSIONS_ARRAY <<< "$BUILD_VERSIONS"
          for entry in "${VERSIONS_ARRAY[@]}"; do
            module="${entry%%:*}"
            version="${entry#*:}"
            echo "Updating com.mohanlv:${module} to ${version}"
            sed -i.bak "s/com\.mohanlv:${module}:[0-9.]*/com.mohanlv:${module}:${version}/g" app/build.gradle.kts
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update components to new versions"
            git push
            echo "✓ ComponentHostApp updated"
          fi