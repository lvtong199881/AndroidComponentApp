name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.COMPONENT_HOST_APP_TOKEN }}

    steps:
      - name: Checkout Components
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Write Python version parser
        run: |
          echo '' | base64 -d > /tmp/get_version.py

      - name: Detect changed modules and compute versions
        id: detect
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Not main branch, skipping"
            exit 0
          fi

          MODULES=$(grep -oP 'include\(":\K[^"]+' settings.gradle.kts | tr '\n' ' ' | sed 's/ $//')
          PREV_MAIN=$(git rev-parse main~1 2>/dev/null || git rev-parse main^1 2>/dev/null || echo "")

          if [ -n "$PREV_MAIN" ]; then
            CHANGED_FILES=$(git diff --name-only $PREV_MAIN..main)
          else
            CHANGED_FILES=""
          fi

          CHANGED_MODULES=""
          for module in $MODULES; do
            if echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              CHANGED_MODULES="${CHANGED_MODULES},${module}"
            fi
          done
          CHANGED_MODULES=${CHANGED_MODULES#,}

          if [ -z "$CHANGED_MODULES" ]; then
            echo "changed-modules=" >> $GITHUB_OUTPUT
            echo "No modules changed, will publish all modules"
            MODULES_TO_PUBLISH="$MODULES"
          else
            echo "changed-modules=${CHANGED_MODULES}" >> $GITHUB_OUTPUT
            echo "Changed modules: ${CHANGED_MODULES}"
            MODULES_TO_PUBLISH="$CHANGED_MODULES"
          fi

          BUILD_VERSIONS=""

          # Debug: 检查 token
          echo "DEBUG: Token length: ${#GITHUB_TOKEN}"
          if [ ${#GITHUB_TOKEN} -eq 0 ]; then
            echo "ERROR: GITHUB_TOKEN is empty or not set"
          fi

          for module in $(echo "$MODULES_TO_PUBLISH" | tr ',' ' '); do
            PACKAGE_NAME="com.mohanlv.${module}"
            API_URL="https://api.github.com/users/lvtong199881/packages/maven/${PACKAGE_NAME}/versions?per_page=100"
            echo "DEBUG: Calling API for $module..."
            echo "DEBUG: API_URL=$API_URL"
            curl -s -v -H "Authorization: Bearer ${GITHUB_TOKEN}" "$API_URL" -o /tmp/api_response.json 2>&1 | head -20
            LATEST_VERSION=$(python3 /tmp/get_version.py /tmp/api_response.json 2>/dev/null)
            echo "DEBUG: LATEST_VERSION=$LATEST_VERSION"
            if [ -z "$LATEST_VERSION" ]; then
              NEW_VERSION="1.0.0"
            else
              LAST_NUM=$(echo $LATEST_VERSION | awk -F'.' '{print $3}')
              NEW_LAST_NUM=$((LAST_NUM + 1))
              NEW_VERSION=$(echo $LATEST_VERSION | awk -F'.' -v n="$NEW_LAST_NUM" '{OFS="."; $3=n; print}')
            fi
            echo ">>> $module: ${LATEST_VERSION:-从未发布} -> ${NEW_VERSION}"
            BUILD_VERSIONS="${BUILD_VERSIONS},${module}:${NEW_VERSION}"
          done

          BUILD_VERSIONS=${BUILD_VERSIONS#,}
          echo "build-versions=${BUILD_VERSIONS}" >> $GITHUB_OUTPUT

      - name: Get commit log
        id: commits
        run: |
          PREV_MAIN=$(git rev-parse main~1 2>/dev/null || git rev-parse main^1 2>/dev/null || echo "")
          if [ -n "$PREV_MAIN" ]; then
            LOG=$(git log --oneline $PREV_MAIN..main | sed 's/^/  - /')
          else
            LOG=$(git log --oneline -10 main | sed 's/^/  - /')
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and publish changed modules
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.COMPONENT_HOST_APP_TOKEN }}
        run: |
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"

          echo "========================================"
          echo "Publishing modules: $BUILD_VERSIONS"
          echo "========================================"

          for module_entry in $(echo "$BUILD_VERSIONS" | tr ',' ' '); do
            module="${module_entry%%:*}"
            VERSION="${module_entry#*:}"
            echo ""
            echo ">>> Building :${module}:assembleRelease (version: ${VERSION})"
            set +e
            ./gradlew :${module}:assembleRelease -P${module}.version=${VERSION} --no-daemon -q
            BUILD_EXIT=$?
            set -e

            if [ ${BUILD_EXIT} -ne 0 ]; then
              echo "!! $module build failed, adding to failed list"
              FAILED_MODULES="${FAILED_MODULES},${module}"
              continue
            fi

            echo ">>> Publishing $module v${VERSION}"
            PUBLISH_OUTPUT=""
            set +e
            ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${VERSION} --no-daemon --stacktrace 2>&1 | tee /tmp/publish_output.txt
            PUBLISH_EXIT=${PIPESTATUS[0]}
            set -e
            
            if [ ${PUBLISH_EXIT} -ne 0 ]; then
              if grep -q "409\|Conflict" /tmp/publish_output.txt 2>/dev/null; then
                echo "!! Publish 409 conflict detected, detecting actual latest version..."
                # 重新获取实际最新版本
                MODULE_API_URL="https://api.github.com/users/lvtong199881/packages/maven/com.mohanlv.${module}/versions?per_page=100"
                curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "$MODULE_API_URL" > /tmp/api_response.json
                ACTUAL_LATEST=$(python3 /tmp/get_version.py /tmp/api_response.json 2>/dev/null || echo "")
                if [ -n "$ACTUAL_LATEST" ]; then
                  LAST_NUM=$(echo $ACTUAL_LATEST | awk -F'.' '{print $3}')
                  retry_version=$(echo $ACTUAL_LATEST | awk -F'.' -v n="$((LAST_NUM + 1))" '{OFS="."; $3=n; print}')
                  echo ">>> Retrying with version $retry_version"
                  ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${retry_version} --no-daemon -q
                  if [ $? -eq 0 ]; then
                    echo "✓ $module v${retry_version} published (retry successful)"
                    BUILD_VERSIONS=$(echo "$BUILD_VERSIONS" | sed "s/${module}:${VERSION}/${module}:${retry_version}/")
                  else
                    echo "!! $module publish retry failed, adding to failed list"
                    FAILED_MODULES="${FAILED_MODULES},${module}"
                    continue
                  fi
                else
                  echo "!! Could not determine latest version for retry, adding to failed list"
                  FAILED_MODULES="${FAILED_MODULES},${module}"
                  continue
                fi
              elif grep -q "401\|Unauthorized" /tmp/publish_output.txt 2>/dev/null; then
                echo "!! Publish 401 Unauthorized, detecting actual latest version..."
                MODULE_API_URL="https://api.github.com/users/lvtong199881/packages/maven/com.mohanlv.${module}/versions?per_page=100"
                curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "$MODULE_API_URL" > /tmp/api_response.json
                ACTUAL_LATEST=$(python3 /tmp/get_version.py /tmp/api_response.json 2>/dev/null || echo "")
                if [ -z "$ACTUAL_LATEST" ]; then
                  echo "!! Could not determine latest version for 401 retry, adding to failed list"
                  FAILED_MODULES="${FAILED_MODULES},${module}"
                  continue
                fi
                if [ "$ACTUAL_LATEST" = "$VERSION" ]; then
                  echo ">>> 401 on same version ($VERSION), retrying after 5s..."
                  sleep 5
                  set +e
                  ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${VERSION} --no-daemon -q
                  if [ $? -eq 0 ]; then
                    echo "✓ $module v${VERSION} published (retry successful)"
                  else
                    echo "!! Same version still fails, incrementing to next version..."
                    LAST_NUM=$(echo $VERSION | awk -F'.' '{print $3}')
                    retry_version=$(echo $VERSION | awk -F'.' -v n="$((LAST_NUM + 1))" '{OFS="."; $3=n; print}')
                    echo ">>> Retrying with version $retry_version"
                    ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${retry_version} --no-daemon -q
                    if [ $? -eq 0 ]; then
                      echo "✓ $module v${retry_version} published (retry successful)"
                      BUILD_VERSIONS=$(echo "$BUILD_VERSIONS" | sed "s/${module}:${VERSION}/${module}:${retry_version}/")
                    else
                      echo "!! $module v${retry_version} retry failed, adding to failed list"
                      FAILED_MODULES="${FAILED_MODULES},${module}"
                      continue
                    fi
                  fi
                  set -e
                else
                  LAST_NUM=$(echo $ACTUAL_LATEST | awk -F'.' '{print $3}')
                  retry_version=$(echo $ACTUAL_LATEST | awk -F'.' -v n="$((LAST_NUM + 1))" '{OFS="."; $3=n; print}')
                  echo ">>> Retrying 401 with version $retry_version"
                  set +e
                  ./gradlew :${module}:publishMavenPublicationToGitHubPackagesRepository -P${module}.version=${retry_version} --no-daemon -q
                  if [ $? -eq 0 ]; then
                    echo "✓ $module v${retry_version} published (retry successful)"
                    BUILD_VERSIONS=$(echo "$BUILD_VERSIONS" | sed "s/${module}:${VERSION}/${module}:${retry_version}/")
                  else
                    echo "!! $module publish retry failed, adding to failed list"
                    FAILED_MODULES="${FAILED_MODULES},${module}"
                    continue
                  fi
                  set -e
                fi
              else
                echo "!! $module publish failed (exit ${PUBLISH_EXIT}), adding to failed list"
                FAILED_MODULES="${FAILED_MODULES},${module}"
                continue
              fi
            else
              echo "✓ $module v${VERSION} published"
            fi
          done

          if [ -n "$FAILED_MODULES" ]; then
            FAILED_MODULES=${FAILED_MODULES#,}
            echo "========================================"
            echo "WARNING: Some modules failed to publish:"
            echo "  $FAILED_MODULES"
            echo "These modules will not be included in the release."
            echo "========================================"
            # Remove failed modules from BUILD_VERSIONS for release
            for failed in $(echo "$FAILED_MODULES" | tr ',' ' '); do
              BUILD_VERSIONS=$(echo "$BUILD_VERSIONS" | sed "s/,*${failed}:[^,]*/,/g" | sed 's/^,//;s/,$//')
            done
            if [ -z "$BUILD_VERSIONS" ]; then
              echo "ERROR: All modules failed to publish, exiting."
              exit 1
            fi
            echo "Updated BUILD_VERSIONS for release: $BUILD_VERSIONS"
            echo "$BUILD_VERSIONS" > /tmp/final_build_versions.txt
          fi

      - name: Create GitHub Release
        id: create-release
        run: |
          if [ -f /tmp/final_build_versions.txt ]; then
            BUILD_VERSIONS=$(cat /tmp/final_build_versions.txt)
          else
            BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"
          fi
          if echo "$BUILD_VERSIONS" | grep -q ','; then
            TAG_NAME=$(echo "$BUILD_VERSIONS" | tr ',' '\n' | while read entry; do
              MODULE=$(echo "$entry" | cut -d: -f1)
              VERSION=$(echo "$entry" | cut -d: -f2)
              echo "${MODULE}-${VERSION}"
            done | tr '\n' '_' | sed 's/_$//' | sed 's/_/-/g')
          else
            TAG_NAME=$(echo "$BUILD_VERSIONS" | cut -d: -f2)
          fi
          echo "TAG_NAME=v${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Created tag: v${TAG_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.COMPONENT_HOST_APP_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create-release.outputs.TAG_NAME }}
          name: Release ${{ steps.detect.outputs.build-versions }}
          body: |
            ## Changes

            ${{ steps.commits.outputs.log }}

            ## Modules Published

            ${{ steps.detect.outputs.build-versions }}
          draft: false
          prerelease: false
          token: ${{ secrets.COMPONENT_HOST_APP_TOKEN }}

      - name: Update ComponentHostApp
        env:
          COMPONENT_HOST_APP_TOKEN: ${{ secrets.COMPONENT_HOST_APP_TOKEN }}
        run: |
          BUILD_VERSIONS="${{ steps.detect.outputs.build-versions }}"
          echo "========================================"
          echo "Updating ComponentHostApp"
          echo "Build versions: $BUILD_VERSIONS"
          echo "========================================"

          cd ..
          git clone "https://x-access-token:${COMPONENT_HOST_APP_TOKEN}@github.com/lvtong199881/ComponentHostApp.git"
          cd ComponentHostApp
          git checkout main

          IFS=',' read -ra VERSIONS_ARRAY <<< "$BUILD_VERSIONS"
          for entry in "${VERSIONS_ARRAY[@]}"; do
            module="${entry%%:*}"
            version="${entry#*:}"
            echo "Updating com.mohanlv:${module} to ${version}"
            sed -i.bak -E "s/(com\.mohanlv:${module}:)[0-9.]*()/\1${version}\2/g" app/build.gradle.kts
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update components to new versions"
            git push
            echo "✓ ComponentHostApp updated"
          fi
# CI test: no module changes
